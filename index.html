<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HH MASTER - CONTROL PROFESIONAL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e3a8a; --accent: #84cc16; --bg: #f0f4f8; --white: #ffffff;
            --text-main: #1e293b; --text-light: #64748b;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }

        .container { max-width: 1100px; margin: 20px auto; padding: 10px; }

        /* HEADER */
        .glass-header { 
            background: var(--white); padding: 25px; border-radius: 24px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; box-shadow: var(--shadow-md); flex-wrap: wrap; gap: 20px;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo-container { width: 120px; flex-shrink: 0; }
        .logo-container img { width: 100%; height: auto; }

        .user-status { border-left: 2px solid #e2e8f0; padding-left: 20px; }
        .user-status h2 { margin: 0; font-size: 1.2rem; color: var(--primary); font-weight: 800; }
        
        /* BOTONES 2x2 */
        .top-buttons-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 320px; }
        
        .btn-card {
            border: none; padding: 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.25s; color: white; box-shadow: var(--shadow-sm);
        }

        .btn-reset { background: #ef4444; } .btn-print { background: #10b981; }
        .btn-pdf { background: #8b5cf6; } .btn-excel { background: #15803d; }

        .btn-card:hover { transform: translateY(-3px); filter: brightness(1.15); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.2); }
        .btn-card:active { transform: translateY(1px); }

        /* TABLA */
        .main-card { background: var(--white); padding: 30px; border-radius: 28px; box-shadow: var(--shadow-md); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { color: var(--text-light); font-size: 0.75rem; text-transform: uppercase; padding: 15px; font-weight: 800; }
        td { background: #f8fafc; padding: 15px; text-align: center; transition: 0.2s; }
        tr:hover td { background: #f1f5f9; }
        td:first-child { border-radius: 15px 0 0 15px; font-weight: 800; color: var(--primary); }
        td:last-child { border-radius: 0 15px 15px 0; }

        input { background: white; border: 1px solid #e2e8f0; padding: 10px; border-radius: 10px; width: 100%; text-align: center; font-weight: 600; }

        .table-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; }

        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: #1e40af; transform: scale(1.02); }

        .btn-finish { background: var(--accent); color: var(--primary); border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-finish:hover { filter: brightness(1.05); transform: scale(1.02); box-shadow: 0 5px 15px rgba(132, 204, 22, 0.3); }

        .total-banner {
            background: var(--primary); color: white; margin-top: 30px; padding: 25px; 
            border-radius: 22px; text-align: center; font-size: 1.5rem; font-weight: 800;
            border-bottom: 5px solid var(--accent);
        }

        /* HISTORIAL */
        .historial { margin-top: 40px; border-top: 2px dashed #e2e8f0; padding-top: 20px; }
        .historial h3 { color: var(--primary); font-weight: 800; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        
        .registro-item {
            background: white; margin-bottom: 12px; padding: 18px; border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-sm); border: 1px solid transparent; transition: 0.3s; cursor: pointer;
        }
        .registro-item:hover { border-color: var(--accent); transform: translateX(5px); }
        
        .delete-mini { background: #fee2e2; border: none; color: #ef4444; border-radius: 8px; cursor: pointer; padding: 8px; transition: 0.2s; }
        .delete-mini:hover { background: #ef4444; color: white; }

        .badge { background: #f0fdf4; color: #166534; padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; border: 1px solid #bbf7d0; }
    </style>
</head>

            </div>
            <div class="user-status">
                <h2>SISTEMA CONTROL HH</h2>
                <p id="currentDateDisplay" style="font-size:0.75rem; color:var(--text-light); font-weight:600;">Cargando fecha...</p>
                <div class="badge" style="margin-top:5px; display:inline-block;">● ARCHIVO MAESTRO V7.5</div>
            </div>
        </div>

        <div class="top-buttons-grid export-ignore">
            <button class="btn-card btn-reset" onclick="reiniciar()"><i class="fa fa-trash"></i> REINICIAR</button>
            <button class="btn-card btn-print" onclick="window.print()"><i class="fa fa-print"></i> IMPRIMIR</button>
            <button class="btn-card btn-pdf" onclick="exportarPDF()"><i class="fa fa-file-pdf"></i> PDF</button>
            <button class="btn-card btn-excel" onclick="exportarExcel()"><i class="fa-solid fa-file-excel"></i> EXCEL</button>
        </div>
    </div>

    <div class="main-card">
        <table id="tablaPrincipal">
            <thead>
                <tr>
                    <th>#</th>
                    <th>INICIO</th>
                    <th>FIN</th>
                    <th>HORAS (2 dec)</th>
                    <th>PERSONAS</th>
                    <th>TOTAL HH</th>
                    <th class="export-ignore"></th>
                </tr>
            </thead>
            <tbody id="cuerpo"></tbody>
        </table>

        <div class="table-actions export-ignore">
            <div style="display:flex; gap:10px; background:#f1f5f9; padding:8px; border-radius:15px;">
                <input id="cantidadAgregar" type="number" value="1" min="1" style="width:60px;">
                <button class="btn-primary" onclick="agregarFila()">AGREGAR FILA</button>
            </div>
            <button class="btn-finish" onclick="finalizar()"><i class="fa-solid fa-cloud-arrow-up"></i> GUARDAR JORNADA</button>
        </div>

        <div class="total-banner">
            <small style="font-size: 0.8rem; display: block; opacity: 0.8;">Total Acumulado HH</small>
            <span id="total">0.00</span> <small>HH</small>
        </div>
    </div>

    <div class="historial export-ignore">
        <h3 onclick="toggleHistorial()"><i class="fa-solid fa-history"></i> REGISTROS ARCHIVADOS</h3>
        <div id="listaHistorial"></div>
    </div>
</div>

<script>
    let tabla = document.getElementById("cuerpo");

    function updateDateLabel() {
        const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('es-PE', opciones);
    }

    function agregarFila(data = null) {
        let cantidad = data ? 1 : parseInt(document.getElementById("cantidadAgregar").value || 1);
        for(let i = 0; i < cantidad; i++) {
            let numero = tabla.rows.length + 1;
            let fila = document.createElement("tr");
            fila.innerHTML = `
                <td>${numero}</td>
                <td><input type="time" value="${data?.inicio || ""}" onchange="calcular(this)"></td>
                <td><input type="time" value="${data?.fin || ""}" onchange="calcular(this)"></td>
                <td class="horas" style="font-weight:700;">0.00</td>
                <td><input type="number" value="${data?.personas || 1}" onchange="calcular(this)"></td>
                <td class="hh" style="font-weight:800; color:var(--primary);">0.00</td>
                <td class="export-ignore"><button class="delete-mini" onclick="eliminarFila(this)"><i class="fa fa-times"></i></button></td>
            `;
            tabla.appendChild(fila);
            if(data) calcular(fila.children[1].children[0]);
        }
        sumar();
    }

    function eliminarFila(btn) { btn.parentNode.parentNode.remove(); renumerar(); sumar(); }
    function renumerar() { document.querySelectorAll("#cuerpo tr").forEach((f, i) => { f.children[0].innerText = i + 1; }); }

    function calcular(el) {
        let fila = el.parentNode.parentNode;
        let inicio = fila.children[1].children[0].value;
        let fin = fila.children[2].children[0].value;
        let personas = parseInt(fila.children[4].children[0].value || 0);

        if(inicio && fin) {
            let mIni = parseInt(inicio.split(":")[0])*60 + parseInt(inicio.split(":")[1]);
            let mFin = parseInt(fin.split(":")[0])*60 + parseInt(fin.split(":")[1]);
            let min = mFin < mIni ? (mFin + 1440) - mIni : mFin - mIni;
            
            // Lógica exacta de redondeo
            let horasRedondeadas = parseFloat((min / 60).toFixed(2));
            fila.querySelector(".horas").innerText = horasRedondeadas.toFixed(2);
            fila.querySelector(".hh").innerText = (horasRedondeadas * personas).toFixed(2);
            sumar();
        }
    }

    function sumar() {
        let total = 0;
        document.querySelectorAll(".hh").forEach(c => { total += parseFloat(c.innerText) || 0; });
        document.getElementById("total").innerText = total.toFixed(2);
    }

    // --- FUNCIONES DE GUARDADO Y HISTORIAL ---
    function finalizar() {
        let nombre = prompt("Ingrese nombre para este registro (ej. Turno Mañana - Lunes):");
        if(!nombre) return;

        let filas = [];
        document.querySelectorAll("#cuerpo tr").forEach(f => {
            filas.push({
                inicio: f.children[1].children[0].value,
                fin: f.children[2].children[0].value,
                personas: f.children[4].children[0].value
            });
        });

        let historial = JSON.parse(localStorage.getItem("historial_HH_Pro") || "[]");
        historial.push({
            nombre: nombre,
            fecha: new Date().toLocaleString(),
            total: document.getElementById("total").innerText,
            datos: filas
        });

        localStorage.setItem("historial_HH_Pro", JSON.stringify(historial));
        alert("¡Jornada guardada correctamente!");
        reiniciar();
        cargarHistorial();
    }

    function cargarHistorial() {
        let cont = document.getElementById("listaHistorial");
        cont.innerHTML = "";
        let historial = JSON.parse(localStorage.getItem("historial_HH_Pro") || "[]");
        
        historial.reverse().forEach((h, i) => {
            let div = document.createElement("div");
            div.className = "registro-item";
            div.innerHTML = `
                <div>
                    <strong style="color:var(--primary); font-size:1rem;">${h.nombre}</strong><br>
                    <small style="color:var(--text-light); font-weight:600;">${h.fecha} | <b>Total: ${h.total} HH</b></small>
                </div>
                <button class="delete-mini" onclick="event.stopPropagation(); eliminarRegistro(${historial.length - 1 - i})"><i class="fa fa-trash"></i></button>
            `;
            div.onclick = () => {
                if(confirm("¿Cargar este registro? Se perderán los datos actuales.")) {
                    tabla.innerHTML = "";
                    h.datos.forEach(d => agregarFila(d));
                }
            };
            cont.appendChild(div);
        });
    }

    function eliminarRegistro(idx) {
        if(!confirm("¿Eliminar este registro del historial?")) return;
        let historial = JSON.parse(localStorage.getItem("historial_HH_Pro") || "[]");
        historial.splice(idx, 1);
        localStorage.setItem("historial_HH_Pro", JSON.stringify(historial));
        cargarHistorial();
    }

    function toggleHistorial() {
        let h = document.getElementById("listaHistorial");
        h.style.display = h.style.display === "none" ? "block" : "none";
    }

    // --- EXPORTACIÓN ---
    async function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const area = document.getElementById('capture-area');
        const ignoreElements = document.querySelectorAll('.export-ignore');
        ignoreElements.forEach(el => el.style.display = 'none');
        try {
            const canvas = await html2canvas(area, { scale: 2, backgroundColor: "#f0f4f8" });
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save(`Reporte_HH_${new Date().getTime()}.pdf`);
        } catch (e) { console.error(e); }
        ignoreElements.forEach(el => el.style.display = '');
    }

    function exportarExcel() {
        let datos = [["#", "INICIO", "FIN", "HORAS", "PERSONAS", "TOTAL HH"]];
        document.querySelectorAll("#cuerpo tr").forEach(f => {
            datos.push([f.children[0].innerText, f.children[1].children[0].value, f.children[2].children[0].value, f.children[3].innerText, f.children[4].children[0].value, f.children[5].innerText]);
        });
        let hoja = XLSX.utils.aoa_to_sheet(datos);
        let libro = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(libro, hoja, "HH Reporte");
        XLSX.writeFile(libro, "Control_HH.xlsx");
    }

    function reiniciar() { if(confirm("¿Limpiar tabla?")) { tabla.innerHTML = ""; agregarFila(); sumar(); } }
    
    updateDateLabel();
    agregarFila();
    cargarHistorial();
</script>

</body>
</html>
